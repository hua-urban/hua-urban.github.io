<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#CF2030">
<title>預約來賓體驗｜BNI 華都更分會</title>
<script>
/* LINE 內建瀏覽器自動跳手機系統瀏覽器（沿用自 huadu-tea / bni-powerteam） */
(function () {
  var ua = navigator.userAgent || '';
  if (/Line\//.test(ua) && !new URL(location.href).searchParams.has('openExternalBrowser')) {
    var url = new URL(location.href);
    url.searchParams.set('openExternalBrowser', '1');
    window.location.href = url.toString();
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════
   視覺 token 全數自 https://hua-urban.github.io/ 首頁實際 CSS 複製
   （紅/金/灰階/圓角/陰影/字體/navbar/zoom-sec 全部同款，做兄弟頁）
   V5：Joan 圈定結構——白色襯線 hero 整段刪除，紅色漸層 zoom-sec 升格為
   開場第一屏 hero，極簡到只剩 eyebrow＋大標＋一句副文（時間/連結/
   玻璃卡全刪，表單本身不動）。
   僅 3 處為表單可用性微調偏離 DNA：field-hint／placeholder／sec-head p
   的灰階從首頁的 gray-400（對白底僅 2.98:1，未達 WCAG 4.5:1）提升到
   gray-600（6:1），其餘全部原樣沿用首頁色票。
══════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CF2030;--red-dark:#A8192A;--red-light:#E8404F;
  --gold:#B8963E;
  --white:#FFFFFF;--off-white:#F8F9FA;
  --gray-50:#F2F3F5;--gray-100:#E4E6EA;--gray-200:#C8CDD6;--gray-300:#AEB4BF;
  --gray-400:#8E96A3;--gray-500:#717985;--gray-600:#5A6472;--gray-800:#2D3440;--gray-900:#1A1F29;
  --nav-h:64px;
  --shadow-sm:0 1px 3px rgba(26,31,41,.08);
  --shadow-md:0 4px 12px rgba(26,31,41,.10),0 2px 4px rgba(26,31,41,.06);
  --r-sm:4px;--r-md:8px;--r-lg:12px;
}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC",sans-serif;background:var(--white);color:var(--gray-800);line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.container{width:100%;max-width:1240px;margin:0 auto;padding:0 24px}

/* ── NAV（照抄首頁 .navbar/.navbar-brand/.nav-cta）── */
.navbar{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--gray-100);box-shadow:0 1px 8px rgba(26,31,41,.06)}
.navbar>.container{height:100%}
.navbar-inner{height:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.navbar-brand{display:flex;align-items:center;gap:10px;line-height:1;min-width:0}
.brand-logo{display:block;flex-shrink:0}
.brand-divider{width:1px;height:22px;background:var(--gray-300);flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;color:var(--gray-900);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-name span{color:var(--red)}
.nav-cta{background:var(--red);color:#fff;font-weight:600;font-size:14px;border-radius:var(--r-sm);padding:8px 16px;white-space:nowrap;flex-shrink:0;transition:background .15s}
.nav-cta:hover{background:var(--red-dark)}
@media(max-width:420px){.brand-name{font-size:13px}.brand-divider{display:none}}
@media(max-width:360px){.brand-name span{display:none}.nav-cta{padding:8px 12px;font-size:13px}}

/* ── 紅色漸層 HERO（V5：Joan 圈定升格為開場第一屏，白色襯線 hero 整段刪除，
   zoom-sec 極簡到只剩 eyebrow＋大標＋一句副文，時間/連結/玻璃卡全刪，
   照抄首頁 .zoom-sec 漸層/裝飾圓，份量的唯一來源）── */
.zoom-sec{background:linear-gradient(135deg,var(--red-dark) 0%,var(--red) 55%,#E0303F 100%);padding:64px 0 76px;position:relative;overflow:hidden}
.zoom-sec::before{content:"";position:absolute;top:-60px;right:-60px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.zoom-sec::after{content:"";position:absolute;bottom:-80px;left:-40px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none}
.zoom-head{position:relative;z-index:1;max-width:680px}
.zoom-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:16px}
.zoom-title{font-family:"Noto Serif TC",serif;font-size:clamp(32px,8vw,54px);font-weight:700;color:#fff;line-height:1.22;letter-spacing:-.01em;margin-bottom:16px;text-wrap:balance}
.zoom-subtitle{font-size:16px;color:rgba(255,255,255,.85);line-height:1.75;max-width:42ch}
@media(max-width:480px){.zoom-title{font-size:30px}}

/* ── 表單區（照抄首頁 .sec-head/.red-bar，欄位樣式借 .search-bar input 手感）── */
.form-sec{background:var(--off-white);padding:52px 0 80px}
.form-wrap{max-width:520px;margin:0 auto}
.sec-head{margin-bottom:24px}
.red-bar{display:block;width:36px;height:3px;background:var(--red);border-radius:2px;margin-bottom:14px}
.sec-head h2{font-family:"Noto Serif TC",serif;font-size:clamp(20px,3vw,24px);font-weight:700;color:var(--gray-900);line-height:1.2;letter-spacing:-.01em;margin-bottom:6px}
.sec-head p{font-size:14px;color:var(--gray-600)}

.form-card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:26px 22px;box-shadow:var(--shadow-sm)}
@media(min-width:640px){.form-card{padding:36px 32px}}

.field-group{margin-bottom:16px}
.field-label{font-size:13px;font-weight:700;color:var(--gray-900);letter-spacing:.01em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.field-label .req{color:var(--red);font-weight:600;font-size:11px}
.field-label .opt{color:var(--gray-500);font-weight:600;font-size:11px}

.field-input,select.field-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--r-md);
  font-family:"Noto Sans TC",sans-serif;font-size:16px;color:var(--gray-800);background:var(--white);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field-input::placeholder{color:var(--gray-600)}
.field-input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(207,32,48,.1)}
select.field-input{
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%235A6472' stroke-width='1.5' fill='none'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:34px;
}
select.field-input option{background:var(--white);color:var(--gray-800)}
.field-hint{margin-top:6px;font-size:12px;color:var(--gray-600);line-height:1.6}

.action-area{margin-top:22px}
.submit-btn{
  background:var(--red);color:#fff;border:none;border-radius:var(--r-md);padding:15px 24px;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:16px;letter-spacing:.02em;
  cursor:pointer;width:100%;box-shadow:var(--shadow-sm);
  transition:background .18s,transform .12s,box-shadow .18s;
}
.submit-btn:hover:not(:disabled){background:var(--red-dark);box-shadow:0 8px 22px rgba(207,32,48,.28)}
.submit-btn:active:not(:disabled){transform:scale(.98)}
.submit-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.submit-btn:disabled{background:var(--gray-200);color:var(--gray-500);cursor:not-allowed;box-shadow:none}

.status-msg{margin-top:14px;font-size:13px;color:var(--gray-600);min-height:18px;line-height:1.6;text-align:center}
.status-msg.success{color:var(--gray-900);font-weight:700}
.status-msg.error{color:var(--red);font-weight:700}

/* ── 成功畫面 ── */
#successScreen{
  display:none;background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-lg);
  padding:46px 22px;text-align:center;box-shadow:var(--shadow-sm);animation:fadeUp .4s ease;
}
.success-icon{width:56px;height:56px;margin:0 auto 18px;border-radius:50%;background:rgba(207,32,48,.08);display:flex;align-items:center;justify-content:center;color:var(--red)}
.success-icon svg{width:28px;height:28px}
.success-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;color:var(--gray-900);margin-bottom:10px}
.success-count{font-family:"Noto Serif TC",serif;font-weight:700;font-size:28px;color:var(--red);margin-bottom:14px}
.success-body{font-size:14px;color:var(--gray-600);line-height:1.9}
.success-body strong{color:var(--gray-900)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){
  #successScreen{animation:none}
  .field-input,select.field-input,.submit-btn,.nav-cta{transition:none}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     ⬇⬇⬇  部署後回填這一行！  ⬇⬇⬇
     ═══════════════════════════════════════════════════════════ -->
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwX7BsF7OWcfP2DA5byYQ5CscN73SeOVe6w7qmCpMBMQaIdf6oyMAq6APVElfPS4kls/exec';
</script>
<!-- ═══════════════════════════════════════════════════════════
     ⬆⬆⬆  部署後回填這一行！  ⬆⬆⬆
     ═══════════════════════════════════════════════════════════ -->

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <svg class="brand-logo" width="52" height="27" viewBox="0 0 116 60" xmlns="http://www.w3.org/2000/svg" aria-label="BNI">
          <text x="0" y="46" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="48" fill="#CF2030" letter-spacing="-1">BNI</text>
          <text x="104" y="20" font-family="Arial, sans-serif" font-size="13" fill="#CF2030">&#174;</text>
        </svg>
        <span class="brand-divider"></span>
        <span class="brand-name">華都更 <span>Hua Urban+</span></span>
      </div>
      <a href="#guestForm" class="nav-cta">預約來賓體驗</a>
    </div>
  </div>
</nav>

<header class="zoom-sec">
  <div class="container">
    <div class="zoom-head">
      <div class="zoom-label">來賓專屬 · Guest Experience</div>
      <h1 class="zoom-title">先進來看看，我們都在聊什麼</h1>
      <p class="zoom-subtitle">想知道實際上都在聊什麼，先來體驗一次例會，我們幫您留位。</p>
    </div>
  </div>
</header>

<section class="form-sec" id="guestForm">
  <div class="container">
    <div class="form-wrap">

      <div class="sec-head">
        <span class="red-bar"></span>
        <h2>填寫來賓資料</h2>
        <p>資料送出後，秘書會統一以 email／LINE 通知場地與細節。</p>
      </div>

      <div class="form-card">

        <div id="formSection">

          <div class="field-group">
            <div class="field-label">想參加哪一場？ <span class="req">必選</span></div>
            <select class="field-input" id="fieldSession">
              <option value="">場次載入中…</option>
            </select>
            <div class="field-hint" id="sessionHint"></div>
          </div>

          <div class="field-group">
            <div class="field-label">怎麼稱呼您？ <span class="req">必填</span></div>
            <input class="field-input" type="text" id="fieldName" placeholder="請輸入姓名" autocomplete="name">
          </div>

          <div class="field-group">
            <div class="field-label">您的專業領域？ <span class="req">必填</span></div>
            <input class="field-input" type="text" id="fieldExpertise" placeholder="例：房屋仲介、室內設計、會計師">
          </div>

          <div class="field-group">
            <div class="field-label">是哪一位華都更夥伴邀請您呢？ <span class="req">必填</span></div>
            <input class="field-input" type="text" id="fieldReferrer" placeholder="填寫邀請您的夥伴姓名">
          </div>

          <div class="field-group">
            <div class="field-label">手機號碼 <span class="req">必填</span></div>
            <input class="field-input" type="tel" id="fieldPhone" placeholder="09xxxxxxxx" autocomplete="tel" inputmode="numeric">
            <div class="field-hint">格式：09 開頭，10 碼數字</div>
          </div>

          <div class="field-group">
            <div class="field-label">LINE ID <span class="opt">選填</span></div>
            <input class="field-input" type="text" id="fieldLineId" placeholder="方便會前聯繫，沒有可以留空">
          </div>

          <div class="field-group">
            <div class="field-label">Email <span class="opt">選填</span></div>
            <input class="field-input" type="email" id="fieldEmail" placeholder="your@email.com" autocomplete="email" inputmode="email">
          </div>

          <div class="action-area">
            <button class="submit-btn" id="submitBtn" disabled>預約來賓體驗</button>
            <div class="status-msg" id="statusMsg"></div>
          </div>
        </div><!-- /formSection -->

        <div id="successScreen">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg>
          </div>
          <div class="success-title" id="successTitle">已為您留好位置！</div>
          <div class="success-count" id="successCount"></div>
          <div class="success-body" id="successBody"></div>
        </div>

      </div><!-- /form-card -->
    </div><!-- /form-wrap -->
  </div><!-- /container -->
</section>

<script>
/* ════════════════════════════════════════════════════════════════
   資料流：
   1. 頁面載入 → fetchSessions() 向 GAS doGet(?sessions=1) 拿開放場次
   2. 填完必填欄位 + 選好場次 → submitBtn 啟用
   3. 送出 → fetch POST（text/plain，避開 preflight，非 no-cors 才能讀 body）
      - ok:true, duplicate:false → 顯示成功畫面「第 N 位」
      - ok:true, duplicate:true  → 顯示成功畫面「已登記，第 N 位」（idempotent，非錯誤）
      - ok:false                → 依 error 顯示對應訊息
════════════════════════════════════════════════════════════════ */

var fieldSession   = document.getElementById('fieldSession');
var fieldName      = document.getElementById('fieldName');
var fieldExpertise = document.getElementById('fieldExpertise');
var fieldReferrer  = document.getElementById('fieldReferrer');
var fieldPhone     = document.getElementById('fieldPhone');
var fieldLineId    = document.getElementById('fieldLineId');
var fieldEmail     = document.getElementById('fieldEmail');
var submitBtn      = document.getElementById('submitBtn');
var statusMsg      = document.getElementById('statusMsg');
var sessionHint    = document.getElementById('sessionHint');
var formSection    = document.getElementById('formSection');
var successScreen  = document.getElementById('successScreen');

var sessionsData = [];

function showStatus(text, cls, duration) {
  statusMsg.textContent = text;
  statusMsg.className = 'status-msg' + (cls ? ' ' + cls : '');
  if (duration) {
    setTimeout(function () { statusMsg.textContent = ''; statusMsg.className = 'status-msg'; }, duration);
  }
}

function validateForm() {
  var name      = fieldName.value.trim();
  var expertise = fieldExpertise.value.trim();
  var referrer  = fieldReferrer.value.trim();
  var phone     = fieldPhone.value.trim();
  var session   = fieldSession.value;
  if (!name || !expertise || !referrer || !phone || !session) return false;
  if (!/^09\d{8}$/.test(phone)) return false;
  var email = fieldEmail.value.trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return false;
  return true;
}

function updateSubmitBtn() { submitBtn.disabled = !validateForm(); }

[fieldSession, fieldName, fieldExpertise, fieldReferrer, fieldPhone, fieldEmail].forEach(function (f) {
  f.addEventListener('input', updateSubmitBtn);
  f.addEventListener('change', updateSubmitBtn);
});

function fetchSessions() {
  if (!GAS_URL || GAS_URL.indexOf('REPLACE_AFTER_DEPLOY') !== -1) {
    fieldSession.innerHTML = '<option value="">系統尚未設定完成</option>';
    showStatus('系統尚未設定完成，請聯絡導師協調夥伴。', 'error', 0);
    return;
  }
  fetch(GAS_URL + '?sessions=1')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (!data.ok || !Array.isArray(data.sessions)) throw new Error('格式錯誤');
      sessionsData = data.sessions;
      if (sessionsData.length === 0) {
        fieldSession.innerHTML = '<option value="">目前尚無開放場次</option>';
        sessionHint.textContent = '目前沒有開放中的場次，可以先留意一下，或私訊邀請您的夥伴問問看。';
        return;
      }
      fieldSession.innerHTML = '<option value="">請選擇場次</option>' +
        sessionsData.map(function (s) {
          return '<option value="' + s.id + '">' + s.date + '</option>';
        }).join('');
      fieldSession.addEventListener('change', function () {
        var s = sessionsData.filter(function (x) { return x.id === fieldSession.value; })[0];
        sessionHint.textContent = s && s.deadline ? ('Precall 截止：' + s.deadline) : '';
      });
    })
    .catch(function () {
      fieldSession.innerHTML = '<option value="">場次載入失敗</option>';
      showStatus('場次載入不出來，麻煩重新整理頁面，或聯絡導師協調夥伴看看。', 'error', 0);
    });
}

var ERROR_MESSAGES = {
  missing_field: '請把必填欄位都填寫完整。',
  invalid_phone: '手機號碼格式不太對，請填 09 開頭的 10 碼數字。',
  invalid_email: 'Email 格式不太對，請再確認一次。',
  session_not_found: '找不到這個場次，麻煩重新整理頁面看看。',
  session_closed: '這個場次已經不開放報名了，麻煩重新整理頁面選擇其他場次。'
};

submitBtn.addEventListener('click', function () {
  if (!validateForm()) return;

  submitBtn.disabled = true;
  showStatus('送出中，請稍候…', '', 0);

  var payload = {
    session:    fieldSession.value,
    name:       fieldName.value.trim(),
    expertise:  fieldExpertise.value.trim(),
    referrer:   fieldReferrer.value.trim(),
    phone:      fieldPhone.value.trim(),
    lineId:     fieldLineId.value.trim(),
    email:      fieldEmail.value.trim()
  };

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function (data) {
    if (data.ok) {
      formSection.style.display = 'none';
      successScreen.style.display = 'block';
      document.getElementById('successCount').textContent = '第 ' + data.count + ' 位';
      if (data.duplicate) {
        document.getElementById('successTitle').textContent = '您已經預約過囉！';
        document.getElementById('successBody').innerHTML =
          '<strong>' + payload.name + '</strong> 已經在名單裡了，不用重複填寫。<br><br>有任何問題歡迎聯絡引薦夥伴 ' + payload.referrer + '。';
      } else {
        document.getElementById('successTitle').textContent = '已為您留好位置！';
        document.getElementById('successBody').innerHTML =
          '感謝您邀請 <strong>' + payload.name + '</strong> 一起來看看！<br><br>秘書會統一以 email／LINE 通知場地資訊。<br>有任何問題歡迎聯絡引薦夥伴 ' + payload.referrer + '。';
      }
      /* V4 加了 navbar+hero+紅卡，頁面變長：scrollTo(top) 會把成功畫面藏到 fold 下面，
         改成把 #guestForm 捲進可視範圍，不動任何送出/防重/資料邏輯 */
      document.getElementById('guestForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      showStatus(ERROR_MESSAGES[data.error] || '送出時卡住了，請確認網路後再試一次。若還是不行，麻煩聯絡導師協調夥伴。', 'error', 0);
      submitBtn.disabled = false;
    }
  })
  .catch(function (err) {
    console.error(err);
    showStatus('送出時卡住了，請確認網路後再試一次。若還是不行，麻煩聯絡導師協調夥伴。', 'error', 0);
    submitBtn.disabled = false;
  });
});

fetchSessions();
</script>

</body>
</html>
